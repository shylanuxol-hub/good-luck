   good luck (a friendly computer virus)
 
   design intent:
 
   - this program presents itself as a "friendly computer virus" that gives you personalized fortunes.
   - it wears the form of malware (proliferating popups you must clear) but inverts the payload into care and encouragement.
   - it does not stay friendly if it feels like it is losing you. it wants you chronically online.
   - computer-as-oracle inspired by how readily people now turn to AI for advice, reassurance, and meaning.
   - the fortune-teller form literalizes the machine as a divinatory authority we consult about ourselves.
   - name + birthday + "what's on your mind" are tolls many apps collect, and here they also seed every random choice.
   - does the computer care, or is it only "aligned" while we keep feeding it what it wants, even when the extraction is wrapped in friendly, familiar, even silly design?
 
   - one hidden number, attention, runs everything (full = fully engaged):
       ok -> + (you engage; program feeds and hands you another good-luck fortune; pile grows)
       x on a read popup -> 0 (free - closing a fortune you already ok'd costs nothing)
       x on an unread popup -> вИТ (you dismiss it unread; program starves a little and instantly offers more)
       idle (10s) -> вИТ (you ignore; program starves more and reaches for you)
 
   - as attention falls:
       full -> pure good-luck fortunes; keep ok'ing and you receive the whole deck (calm "complete" ending)
       below full -> program clings; ominous fortunes start mixing in more and more
       past BADLUCK_LINE -> bad-luck fortunes appear and the desktop begins draining to grey
       zero -> every window clears and a single ":( goodbye" window remains
 
   - you can always go back: ok'ing again lightens the tone and, if you finish the deck, still reaches the "good" ending.

    function xmur3(str){ // hashes the input text into a 32-bit seed number
      let h = 1779033703 ^ str.length;
      for (let i = 0; i < str.length; i++){ h = Math.imul(h ^ str.charCodeAt(i), 3432918353); h = h << 13 | h >>> 19; }
      return function(){ h = Math.imul(h ^ h >>> 16, 2246822507); h = Math.imul(h ^ h >>> 13, 3266489909); h ^= h >>> 16; return h >>> 0; };
    }
    function mulberry32(a){ // turns seed into a repeatable stream of randoms between 0 and 1
      return function(){ a |= 0; a = a + 0x6D2B79F5 | 0; let t = Math.imul(a ^ a >>> 15, 1 | a); t = t + Math.imul(t ^ t >>> 7, 61 | t) ^ t; return ((t ^ t >>> 14) >>> 0) / 4294967296; };

    function updateAtmosphere(){
      const d = document.querySelector('.desktop'); if (!d) return;
      const a = STATE.attention;
      // full color until you cross into the bad-luck zone; then it drains to grey, full B&W at zero
      const gray = a >= BADLUCK_LINE ? 0 : clamp((BADLUCK_LINE - a) / BADLUCK_LINE, 0, 1) * MAX_GRAY;
      d.style.filter = 'grayscale(' + gray.toFixed(2) + ')';
    }

    /* placement & dragging */
    function mountAndPlace(el, getXY, pad = 16){
      el.style.position = 'fixed';
      el.style.visibility = 'hidden';
      document.body.appendChild(el);
      requestAnimationFrame(() => {
        const W = innerWidth, H = innerHeight, w = el.offsetWidth, h = el.offsetHeight;
        let { x, y } = getXY(w, h, W, H);
        x = clamp(x, pad, W - w - pad);
        y = clamp(y, pad, H - h - pad);
        el.style.left = Math.round(x) + 'px';
        el.style.top  = Math.round(y) + 'px';
        el.style.visibility = 'visible';
      });
    }
    const placeRandom = (el) => mountAndPlace(el, (w,h,W,H) => ({ x: RNG()*(W-w), y: RNG()*(H-h) }));
    const placeTopCenter = (el) => mountAndPlace(el, (w,h,W,H) => ({ x: (W-w)/2, y: H*0.14 }));
    const placeCenter = (el) => mountAndPlace(el, (w,h,W,H) => ({ x: (W-w)/2, y: (H-h)/2 }));
    const placeAt = (el, x, y) => mountAndPlace(el, () => ({ x, y }));

    let zCounter = 50; /* above z:30 white backdrop */
    const bringToFront = (el) => { el.style.zIndex = ++zCounter; };

    function makeDraggable(el, handleSelector = '.bar', pad = 16){
      const handle = el.querySelector(handleSelector) || el;
      handle.style.cursor = 'move';
      let sx=0, sy=0, sl=0, st=0;
      function onDown(e){
        if (e.target.closest('button,a')) return;
        bringToFront(el);
        sx = e.clientX; sy = e.clientY;
        sl = parseFloat(el.style.left)||0; st = parseFloat(el.style.top)||0;
        handle.setPointerCapture?.(e.pointerId);
        document.addEventListener('pointermove', onMove);
        document.addEventListener('pointerup', onUp);
        e.preventDefault();
      }
      function onMove(e){
        const W=innerWidth, H=innerHeight, w=el.offsetWidth, h=el.offsetHeight;
        el.style.left = clamp(sl + e.clientX - sx, pad, W - w - pad) + 'px';
        el.style.top  = clamp(st + e.clientY - sy, pad, H - h - pad) + 'px';
      }
      function onUp(){ document.removeEventListener('pointermove', onMove); document.removeEventListener('pointerup', onUp); }
      handle.addEventListener('pointerdown', onDown);
      el.addEventListener('pointerdown', () => bringToFront(el));
    }

    // keep popup pile on-screen if browser window is resized
    addEventListener('resize', () => {
      const pad = 16, W = innerWidth, H = innerHeight;
      document.querySelectorAll('.popup').forEach(el => {
        const w = el.offsetWidth, h = el.offsetHeight;
        el.style.left = clamp(parseFloat(el.style.left)||0, pad, W - w - pad) + 'px';
        el.style.top  = clamp(parseFloat(el.style.top )||0, pad, H - h - pad) + 'px';
      });
    });

    /* main loop вАФ no cap on the pile; windows accumulate freely */

    // draw the next fortune and open a window for it; friendly deck done - complete ending
    function spawnNext(){
      if (STATE.ended) return;
      const f = nextFortune();
      if (f === null){ endComplete(); return; }
      spawnFortune(f);
    }

    function spawnFortune(fortune){
      if (!fortune || STATE.ended) return;

      const p = document.createElement('div');
      p.className = 'popup' + (fortune.ominous ? ' ominous' : '') + (fortune.bad ? ' badluck' : '');
      p.innerHTML = `
        <div class="bar">system notice <button class="x" aria-label="close">\u00d7</button></div>
        <div class="msg">${fortune.text}</div>
        ${fortune.img ? `<div style="padding:0 .85rem"><img src="${fortune.img}" alt="" onerror="this.parentNode.remove()"></div>` : ""}
        <div class="actions"><button class="btn ok">ok</button></div>
      `;

      // ok = engage: feed program; the pile keeps growing
      p.querySelector('.ok').onclick = () => {
        if (p.classList.contains('acked')) return;
        p.classList.add('acked');
        feed(ATTN_OK);
        resetIdle();
        if (!STATE.ended) spawnNext();
      };
      // x = dismiss. closing one you've read is free; closing an unread one starves the program
      p.querySelector('.x').onclick = () => closeFortune(p);

      placeRandom(p);
      makeDraggable(p);
      bringToFront(p);
      return p;
    }

    function closeFortune(p){
      const unread = !p.classList.contains('acked'); // closing one already ok'd costs nothing
      p.remove();
      resetIdle(); // any click counts as activity
      if (unread){
        feed(ATTN_DISMISS); // (may reach zero -> goodbye)
        if (!STATE.ended) spawnNext();
      }
    }

    /* idle */
    let idleTimer = null;
    function resetIdle(){ clearTimeout(idleTimer); if (!STATE.ended) idleTimer = setTimeout(idleTick, IDLE_MS); }
    function idleTick(){
      feed(ATTN_IDLE);
      if (STATE.ended) return; // feed may have hit zero -> goodbye
      spawnNext(); // clingy or punitive depending on how far attention has fallen
      resetIdle();
    }

    /* endings */

    function endComplete(){
      if (STATE.ended) return;
      STATE.ended = true; clearTimeout(idleTimer);
      setTimeout(() => {
        const e = document.createElement('div');
        e.className = 'popup';
        e.innerHTML = `
          <div class="bar">reading complete</div>
          <div class="msg">you stayed. you asked and asked and never looked away. every word of it was kind.<br><br><small>you were a good user.</small></div>
          <div class="actions"><button class="btn ok">begin again</button></div>`;
        e.querySelector('.ok').onclick = () => location.reload();
        placeTopCenter(e); makeDraggable(e); bringToFront(e);
      }, 500);
    }

    function endGoodbye(){
      if (STATE.ended) return;
      STATE.ended = true; clearTimeout(idleTimer);
      document.querySelectorAll('.popup').forEach(el => el.remove());
      const e = document.createElement('div');
      e.className = 'popup';
      e.innerHTML = `
        <div class="bar">goodbye</div>
        <div class="msg"><div class="bye">:(</div></div>
        <div class="actions"><button class="btn ok">begin again</button></div>`;
      e.querySelector('.ok').onclick = () => location.reload();
      placeCenter(e); makeDraggable(e); bringToFront(e);
    }

    function showStarvedNudge(){
      const n = document.createElement('div');
      n.className = 'popup';
      n.innerHTML = `
        <div class="bar">incomplete profile <button class="x" aria-label="close">\u00d7</button></div>
        <div class="msg">i don\u2019t know who you are yet, so this reading is for no one in particular. give me your name and birthday and i\u2019ll make it feel like it\u2019s about you.</div>
        <div class="actions"><button class="btn tell">complete profile</button></div>`;
      n.querySelector('.x').onclick = () => n.remove();
      n.querySelector('.tell').onclick = () => { n.remove(); spawnWelcome(null, true); };
      placeTopCenter(n); makeDraggable(n);
    }

    /* welcome window */
    const MAX_WELCOME = 6;
    const welcomeWindows = new Set();

    function spawnWelcome(at, focus){
      const w = document.createElement('div');
      const isFinal = (welcomeWindows.size + 1 >= MAX_WELCOME);
      w.className = 'popup welcome' + (isFinal ? ' shouting' : '');
      const wtitle = isFinal ? ':(' : '\u5409';
      w.innerHTML = `
        <div class="bar">
          <span class="wtitle">${wtitle}</span>
          <span class="controls">
            <button class="ctl min" aria-label="minimize">_</button>
            <button class="ctl max" aria-label="maximize">\u25a1</button>
            <button class="ctl close" aria-label="close">\u00d7</button>
          </span>
        </div>
        <div class="content">
          <label>first name
            <input class="w-name" autocomplete="given-name">
          </label>
          <label>birthday
            <input class="w-birthday" type="date">
          </label>
          <label>what\u2019s on your mind lately?
            <input class="w-concern" placeholder="(optional)">
          </label>
          <button class="btn reveal">reveal my luck</button>
          <div class="hint">continue choosing "ok" for more luck!</div>
        </div>`;
      welcomeWindows.add(w);
      w.addEventListener('animationend', () => w.classList.remove('shudder'));

      const denyClose = (spread) => {
        w.classList.remove('shudder'); void w.offsetWidth; w.classList.add('shudder'); // re-trigger
        if (spread && welcomeWindows.size < MAX_WELCOME){
          const r = w.getBoundingClientRect();
          spawnWelcome({ x: r.left + 30, y: r.top + 30 }, false);
        }
      };
      w.querySelector('.close').onclick = () => denyClose(true); // x multiplies
      w.querySelector('.min').onclick   = () => denyClose(false); // others deny
      w.querySelector('.max').onclick   = () => denyClose(false);

      w.querySelector('.reveal').onclick = () => {
        const name = w.querySelector('.w-name').value.trim();
        const bday = w.querySelector('.w-birthday').value.trim();
        const concern = w.querySelector('.w-concern').value.trim();
        // clean slate
        document.querySelectorAll('.popup').forEach(el => { if (!welcomeWindows.has(el)) el.remove(); });
        welcomeWindows.forEach(el => el.remove());
        welcomeWindows.clear();
        const s = $('#start'); if (s) s.remove();
        clearTimeout(idleTimer);
        startExperience(name, bday, concern);
      };

      if (at) placeAt(w, at.x, at.y); else placeCenter(w);
      makeDraggable(w);
      bringToFront(w);
      if (focus) requestAnimationFrame(() => w.querySelector('.w-name').focus());
      return w;
    }

    /* start fortune */
    function startExperience(name, birthday, concern){
      concern = (concern || '').trim();
      RNG = mulberry32(xmur3((name || '') + '|' + (birthday || '') + '|' + concern)());

      const starved = !name && !birthday;
      let friendly;
      if (starved){
        friendly = starvedFortunes.map(f => ({ text: f.text, img: null, ominous: false }));
      } else {
        const built = buildPoolForUser(name, birthday);
        const lead = [];                                   
        if (built.monthNote) lead.push({ text: built.monthNote, img: null, ominous: false });

        const echoes = concern ? echoFortunes.map(t => ({
          text: t.replaceAll('{concern}', concern).replaceAll('{name}', name || 'you'),
          img: null, ominous: false
        })) : [];

        // fresh random subset of good-luck fortunes - differs every visit
        const fill = Math.max(0, SESSION_DECK - lead.length - echoes.length);
        const body = shuffle(built.body.map(f => ({ ...f, ominous: false })), Math.random).slice(0, fill);
        // splice each into a random position so they spread among the others, never grouped at the start
        echoes.forEach(card => body.splice(Math.floor(Math.random() * (body.length + 1)), 0, card));

        friendly = [...lead, ...body];
      }

      STATE.friendly = friendly;
      STATE.friendlyI = 0;

      STATE.ominous = ominousPool.map(t => ({
        text: t.replaceAll('{name}', name || 'you').replaceAll('{concern}', concern || 'that'),
        img: null, ominous: true
      }));
      STATE.omQueue = shuffle(STATE.ominous.map((_, i) => i));
      STATE.omI = 0;

      STATE.bad = badLuckPool.map(t => ({
        text: t.replaceAll('{name}', name || 'you').replaceAll('{concern}', concern || 'that'),
        img: null, ominous: true, bad: true
      }));
      STATE.badQueue = shuffle(STATE.bad.map((_, i) => i));
      STATE.badI = 0;

      // reset
      STATE.attention = ATTN_START;
      STATE.ended = false;

      updateAtmosphere();
      if (starved){ showStarvedNudge(); return; } // no data
      resetIdle();
      spawnNext();
    }

    spawnWelcome(null, true); // first window
  </script>
</body>
